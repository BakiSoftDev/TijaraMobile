name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup GraalVM
        run: |
          echo "Downloading GraalVM..."
          curl -L -o graalvm.tar.gz "https://github.com/gluonhq/graal/releases/download/gluon-21.0.2/graalvm-svm-java21-darwin-gluon-21.0.2.tar.gz"
          
          echo "Extracting..."
          tar -xzf graalvm.tar.gz
          
          echo "Setting up environment..."
          ls -la
          
          GRAALVM_DIR=$(ls -d graalvm-svm-java* 2>/dev/null || echo "graalvm-svm-java21-21.0.2")
          echo "GRAALVM_HOME=$PWD/$GRAALVM_DIR" >> $GITHUB_ENV
          echo "$PWD/$GRAALVM_DIR/bin" >> $GITHUB_PATH

      - name: Verify GraalVM
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          $GRAALVM_HOME/bin/java -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          export JAVA_HOME=$GRAALVM_HOME
          mvn clean gluonfx:build gluonfx:package

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tijara-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk