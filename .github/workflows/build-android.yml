name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM manually
        run: |
          curl -L https://github.com/gluonhq/graal/releases/download/gluon-21.0.2/graalvm-svm-java17-darwin-gluon-21.0.2.tar.gz -o graalvm.tar.gz
          tar -xzf graalvm.tar.gz
          echo "GRAALVM_HOME=$PWD/graalvm-svm-java17-21.0.2" >> $GITHUB_ENV
          echo "$PWD/graalvm-svm-java17-21.0.2/bin" >> $GITHUB_PATH

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mvn clean gluonfx:build gluonfx:package

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tijara-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk