name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Maven 3.8.8 (required by GluonFX plugin)
        run: |
          curl -L -o maven.tar.gz https://archive.apache.org/dist/maven/maven-3/3.8.8/binaries/apache-maven-3.8.8-bin.tar.gz
          tar -xzf maven.tar.gz
          echo "$PWD/apache-maven-3.8.8/bin" >> $GITHUB_PATH
          echo "MAVEN_HOME=$PWD/apache-maven-3.8.8" >> $GITHUB_ENV

      - name: Verify Maven version
        run: mvn -version

      - name: Download and Setup Gluon GraalVM for Linux
        run: |
          TAG="gluon-22.1.0.1-Final"
          FILE="graalvm-svm-java17-linux-gluon-22.1.0.1-Final.tar.gz"
          URL="https://github.com/gluonhq/graal/releases/download/$TAG/$FILE"
          echo "Downloading Gluon GraalVM from: $URL"
          curl -L -o graalvm.tar.gz "$URL"
          echo "Extracting..."
          tar -xzf graalvm.tar.gz
          GRAALVM_DIR=$(ls -d graalvm-svm-java17*)
          echo "GRAALVM_HOME=$PWD/$GRAALVM_DIR" >> $GITHUB_ENV
          echo "$PWD/$GRAALVM_DIR/bin" >> $GITHUB_PATH

      - name: Verify GraalVM
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          $GRAALVM_HOME/bin/java -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;23.1.7779620" --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Build APK with Maven
        run: |
          export JAVA_HOME=$GRAALVM_HOME
          mvn -B clean gluonfx:build gluonfx:package
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TijaraMobile-Android-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk