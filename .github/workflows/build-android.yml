name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # Linux x86_64 - only host that supports Android cross-compile

    steps:
      - uses: actions/checkout@v4

      - name: Install Maven 3.8.8 (required by GluonFX plugin 1.0.22)
        run: |
          curl -L -o maven.tar.gz https://archive.apache.org/dist/maven/maven-3/3.8.8/binaries/apache-maven-3.8.8-bin.tar.gz
          tar -xzf maven.tar.gz
          echo "$PWD/apache-maven-3.8.8/bin" >> $GITHUB_PATH

      - name: Download and Setup Gluon GraalVM for Linux
        run: |
          URL="https://github.com/gluonhq/graal/releases/download/gluon-22.1.0.1-Final/graalvm-svm-java17-linux-gluon-22.1.0.1-Final.tar.gz"
          echo "Downloading Gluon GraalVM (Linux x86_64)..."
          curl -L -o graalvm.tar.gz "$URL"
          tar -xzf graalvm.tar.gz
          GRAALVM_DIR=$(ls -d graalvm-svm-java17-linux*)
          echo "GRAALVM_HOME=$PWD/$GRAALVM_DIR" >> $GITHUB_ENV
          echo "$PWD/$GRAALVM_DIR/bin" >> $GITHUB_PATH

      - name: Verify GraalVM
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          # Disable container cgroup detection to avoid NPE in GraalVM 22.1 on cgroup v2
          export JAVA_TOOL_OPTIONS="-XX:-UseContainerSupport"
          $GRAALVM_HOME/bin/java -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;23.1.7779620"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.1.7779620" >> $GITHUB_ENV

      - name: Build APK with Maven
        run: |
          export JAVA_HOME=$GRAALVM_HOME
          mvn -B clean gluonfx:build gluonfx:package
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          # Disable cgroup v2 container detection that crashes GraalVM 22.1 on GitHub runners
          JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TijaraMobile-Android-APK
          path: target/gluonfx/aarch64-android/gvm/*.apk